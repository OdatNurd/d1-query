name: Publish to NPMJS

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        description: 'The tag to release, e.g., v1.2.3'
        required: true

jobs:
  publish-npm-package-after-testing:
    permissions:
      id-token: write
      contents: write
    uses: odatnurd/github-workflows/.github/workflows/npm-publish.yaml@npm-publish-v1.0.4
    with:
      node-version: 24
      package-version: ${{ (github.event_name == 'workflow_dispatch' && inputs.tag) || github.ref_name }}
      create-release: true
      test-script: 'test'
      build-script: 'build:vendor'
